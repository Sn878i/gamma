name: Build Gamma Levels

on:
  schedule:
    - cron: '30 10 * * 1-5'   # 6:30am EDT (Mar-Nov)
    - cron: '30 11 * * 1-5'   # 6:30am EST (Nov-Mar)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install yfinance pandas numpy scipy

      - name: Build NQ
        run: python scripts/build_gamma.py nq
        continue-on-error: true

      - name: Build ES
        run: python scripts/build_gamma.py es
        continue-on-error: true

      - name: Stage public outputs
        run: |
          mkdir -p public public/history
          cp data/gamma/nq.json public/nq.json 2>/dev/null || echo "nq.json missing"
          cp data/gamma/es.json public/es.json 2>/dev/null || echo "es.json missing"
          cp -r data/history/* public/history/ 2>/dev/null || true

      - name: Commit if changed
        run: |
          git config user.name  "gamma-bot"
          git config user.email "gamma-bot@steelysystems.com"
          git add data/gamma/ data/history/ public/
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "gamma: $(date -u +%Y-%m-%d)"
            git push
          fi
